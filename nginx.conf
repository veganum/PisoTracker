server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fallback SPA: cualquier ruta desconocida sirve index.html
    # (necesario para que el routing de Angular no dé 404 al recargar)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cacheo agresivo de los assets con hash (outputHashing: all)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # El index nunca se cachea, para recibir despliegues nuevos al instante
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compresión
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
