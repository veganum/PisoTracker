# Configuración de Nixpacks para PisoTracker (SPA estática de Angular 22).
# Angular 22 requiere Node 20.19+ / 22.12+; el default de Nixpacks (Node 18)
# hace fallar `ng build` con exit code 3. Aquí forzamos Node 22.

providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_22']

[phases.install]
cmds = ['npm ci']

[phases.build]
cmds = ['npm run build']

# Sirve los estáticos generados con fallback SPA (-s) para que el routing
# de Angular no dé 404 al recargar. Escucha en el puerto 3000.
# Se usa `npx` para no tener que añadir `serve` a package.json.
[start]
cmd = 'npx -y serve -s dist/pisotracker/browser -l 3000'
